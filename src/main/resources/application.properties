spring.application.name=demo
server.port=8081

# ===== Supabase PostgreSQL Database Configuration =====
# PostgreSQL JDBC connection URL
spring.datasource.url=jdbc:postgresql://db.kdvnogkvnpvbnedsmoui.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=thisisnotai123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== JWT Configuration =====
# Read from environment variables for security
app.jwt.secret=${APP_JWT_SECRET:very_long_random_secret_at_least_32_chars_here_for_testing_only}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

